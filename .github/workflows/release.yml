name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (.deb)
    if: "!contains(github.ref_name, '-win')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Linux .deb bauen
        run: npx electron-builder --linux deb --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-windows:
    name: Build Windows (.exe)
    if: "!contains(github.ref_name, '-linux')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Windows Installer bauen
        run: npx electron-builder --win --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  release:
    name: GitHub Release erstellen
    needs: [build-linux, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release veröffentlichen
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Website benachrichtigen
        run: |
          curl -fsSL -X POST https://movieshelf.info/api/desktop-version/webhook \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DESKTOP_WEBHOOK_SECRET }}" \
            -d '{
              "version":               "${{ github.ref_name }}",
              "download_url":          "${{ fromJson(steps.release.outputs.assets)[0].browser_download_url }}",
              "download_url_linux_deb":"${{ fromJson(steps.release.outputs.assets)[1].browser_download_url }}",
              "changelog":             "Release ${{ github.ref_name }}"
            }'
