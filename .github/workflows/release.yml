name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    name: Build Linux (.deb)
    if: "!contains(github.ref_name, '-win')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Linux .deb bauen
        run: npx electron-builder --linux deb --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-windows:
    name: Build Windows (.exe)
    if: "!contains(github.ref_name, '-linux')"
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm ci

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Windows Installer bauen
        run: npx electron-builder --win --publish never

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  release:
    name: GitHub Release erstellen
    needs: [build-linux, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Changelog-Abschnitt extrahieren
        id: changelog
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          BODY=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Release veröffentlichen
        id: release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          body: ${{ steps.changelog.outputs.body }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Website benachrichtigen
        run: |
          CHANGELOG=$(cat << 'CHANGELOG_EOF'
          ${{ steps.changelog.outputs.body }}
          CHANGELOG_EOF
          )
          curl -fsSL -X POST https://movieshelf.info/api/desktop-version/webhook \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${{ secrets.DESKTOP_WEBHOOK_SECRET }}" \
            -d "$(jq -n \
              --arg version "${{ github.ref_name }}" \
              --arg url_win "${{ fromJson(steps.release.outputs.assets)[0].browser_download_url }}" \
              --arg url_deb "${{ fromJson(steps.release.outputs.assets)[1].browser_download_url }}" \
              --arg changelog "$CHANGELOG" \
              '{version: $version, download_url: $url_win, download_url_linux_deb: $url_deb, changelog: $changelog}')"
