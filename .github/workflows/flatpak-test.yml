name: Flatpak Build (Test)

# Isolierter Testlauf für das Flatpak-Target, bewusst NICHT an den
# Release-Trigger (Tag-Push) gekoppelt - läuft nur manuell, solange der
# Build nicht verifiziert ist. Erst nach erfolgreichem Test in
# release.yml übernehmen.
#
# Nutzt bewusst kein electron-builder --linux flatpak: dessen interne
# @malept/flatpak-bundler-Abhängigkeit reicht die stderr-Ausgabe von
# flatpak-builder nicht durch, ein fehlgeschlagener Build war dadurch
# nicht diagnostizierbar. Stattdessen eigenes Flatpak-Manifest
# (flatpak/info.movieshelf.desktop.yml) + direkter flatpak-builder-Aufruf,
# wie es die meisten echten Flathub-Einträge für Electron-Apps machen.
on:
  workflow_dispatch: {}

jobs:
  build-flatpak:
    name: Build Linux (Flatpak)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      # --dir statt --linux deb/flatpak: erzeugt nur das entpackte
      # release/linux-unpacked, ohne selbst ein Paketformat zu bauen -
      # genau das braucht unser eigenes Flatpak-Modul als Quelle.
      - name: Electron-App entpackt bauen (linux-unpacked)
        run: npx electron-builder --linux dir --publish never

      - name: Flatpak-Werkzeuge installieren
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder
          sudo flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Flatpak-Runtime installieren
        run: |
          sudo flatpak install -y flathub org.freedesktop.Platform//23.08 org.freedesktop.Sdk//23.08
          sudo flatpak install -y flathub org.electronjs.Electron2.BaseApp//23.08

      - name: bubblewrap-Sandbox freigeben (AppArmor, Ubuntu 24.04)
        run: |
          sudo sysctl -w kernel.apparmor_restrict_unprivileged_userns=0 || true
          bwrap --version

      - name: Flatpak-Repo bauen (flatpak-builder, mit voller Ausgabe)
        working-directory: flatpak
        run: |
          flatpak-builder --repo=repo --force-clean --verbose build-dir info.movieshelf.desktop.yml

      - name: Flatpak-Bundle erstellen
        working-directory: flatpak
        run: |
          mkdir -p ../release
          flatpak build-bundle repo ../release/MovieShelf.flatpak info.movieshelf.desktop

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-flatpak
          path: release/*.flatpak
