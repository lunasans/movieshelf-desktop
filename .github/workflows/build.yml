name: Build & Publish

on:
  push:
    tags:
      - 'v*'

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install --ignore-scripts

      - name: Native Module bauen (für Node.js)
        run: npm rebuild better-sqlite3

      - name: Tests ausführen
        run: npm test

  build-linux:
    name: Build Linux (.deb)
    needs: [test]
    if: "!contains(github.ref_name, '-win')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Linux .deb bauen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx electron-builder --linux deb --publish always

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb
          path: release/*.deb

  build-windows:
    name: Build Windows (.exe)
    needs: [test]
    if: "!contains(github.ref_name, '-linux')"
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Node.js einrichten
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Abhängigkeiten installieren
        run: npm install

      - name: Native Module neu bauen
        run: npx @electron/rebuild -f -w better-sqlite3

      - name: App bauen
        run: npx vite build

      - name: Zertifikat einrichten
        env:
          CSC_LINK_BASE64: ${{ secrets.CSC_LINK_BASE64 }}
        run: |
          $bytes = [Convert]::FromBase64String($env:CSC_LINK_BASE64)
          [IO.File]::WriteAllBytes("movieshelf-cert.pfx", $bytes)

      - name: Windows Installer bauen
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_LINK: movieshelf-cert.pfx
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: npx electron-builder --win --publish always

      - name: Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: release/*.exe

  notify:
    name: Website benachrichtigen
    needs: [build-linux, build-windows]
    if: always() && (needs.build-linux.result == 'success' || needs.build-linux.result == 'skipped') && (needs.build-windows.result == 'success' || needs.build-windows.result == 'skipped') && (needs.build-linux.result == 'success' || needs.build-windows.result == 'success')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Artefakte herunterladen
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: SHA256 berechnen
        id: hashes
        run: |
          SHA256_WIN=$(find artifacts -iname "*setup*.exe" -exec sha256sum {} \; 2>/dev/null | awk '{print $1}' | head -1)
          SHA256_DEB=$(find artifacts -name "*.deb"        -exec sha256sum {} \; 2>/dev/null | awk '{print $1}' | head -1)
          echo "win=${SHA256_WIN}" >> $GITHUB_OUTPUT
          echo "deb=${SHA256_DEB}" >> $GITHUB_OUTPUT

      - name: Release-Assets von GitHub holen
        id: assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS_JSON=$(gh release view "${{ github.ref_name }}" --json assets --jq '.assets')
          echo "json=${ASSETS_JSON}" >> $GITHUB_OUTPUT

      - name: Changelog-Abschnitt aus Release-Notes holen
        id: changelog
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(gh release view "${{ github.ref_name }}" --json body --jq '.body')
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Website benachrichtigen
        env:
          ASSETS_JSON: ${{ steps.assets.outputs.json }}
          CHANGELOG_BODY: ${{ steps.changelog.outputs.body }}
          WEBHOOK_SECRET: ${{ secrets.DESKTOP_WEBHOOK_SECRET }}
          WEBHOOK_URL: ${{ secrets.DESKTOP_WEBHOOK_URL }}
          VERSION: ${{ github.ref_name }}
          SHA256_WIN: ${{ steps.hashes.outputs.win }}
          SHA256_DEB: ${{ steps.hashes.outputs.deb }}
        run: |
          URL_WIN=$(echo "$ASSETS_JSON" | jq -r '[.[] | select(.name | ascii_downcase | test("setup.*\\.exe$"))] | first | .browser_download_url // ""')
          URL_DEB=$(echo "$ASSETS_JSON" | jq -r '[.[] | select(.name | endswith(".deb"))]              | first | .browser_download_url // ""')
          curl -fsSL -X POST "$WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $WEBHOOK_SECRET" \
            -d "$(jq -n \
              --arg version    "$VERSION" \
              --arg url_win    "$URL_WIN" \
              --arg url_deb    "$URL_DEB" \
              --arg hash_win   "$SHA256_WIN" \
              --arg hash_deb   "$SHA256_DEB" \
              --arg changelog  "$CHANGELOG_BODY" \
              '{version: $version, download_url: $url_win, download_url_linux_deb: $url_deb, file_hash: $hash_win, file_hash_linux_deb: $hash_deb, changelog: $changelog}')"
