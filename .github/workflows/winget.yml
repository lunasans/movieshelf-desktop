name: Submit to winget

# Manueller Fallback: Die reguläre winget-Einreichung läuft als Job in
# release.yml (das frühere release-Event hier feuerte nie, weil Releases mit
# dem Standard-GITHUB_TOKEN erstellt werden und solche Events absichtlich
# keine weiteren Workflows starten). Dieser Workflow dient zum Nachreichen
# einzelner Versionen, z.B. wenn der Release-Job fehlgeschlagen ist.
#
# Voraussetzungen (einmalig):
#  1. Das Paket muss in winget-pkgs schon existieren — die ERSTE Version einmalig
#     manuell einreichen (siehe packaging/winget/README.md).
#  2. Secret WINGET_TOKEN: ein klassischer GitHub-PAT mit Scope "public_repo"
#     (forkt winget-pkgs und öffnet den PR).

on:
  workflow_dispatch:
    inputs:
      release-tag:
        description: 'Release-Tag (z.B. v0.20.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: winget-Manifest aktualisieren & einreichen
        uses: vedantmgoyal9/winget-releaser@v2
        with:
          identifier: Lunasans.MovieShelf
          installers-regex: 'MovieShelf-Setup-.*\.exe$'
          release-tag: ${{ inputs.release-tag }}
          token: ${{ secrets.WINGET_TOKEN }}
